[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "link-arg=-L/home/node/gcc-root/usr/lib/x86_64-linux-gnu",
    "-C", "link-arg=-L/home/node/gcc-root/usr/lib/gcc/x86_64-linux-gnu/12",
]
linker = "/home/node/gcc-root/bin/cc"

[env]
CC = "/home/node/gcc-root/bin/cc"
AR = "/home/node/gcc-root/bin/ar"
