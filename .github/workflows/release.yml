name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: netcap-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: netcap-aarch64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            name: netcap-x86_64-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            name: netcap-aarch64-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p netcap-cli

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz netcap
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            netcap-x86_64-linux/netcap-x86_64-linux.tar.gz
            netcap-aarch64-linux/netcap-aarch64-linux.tar.gz
            netcap-x86_64-darwin/netcap-x86_64-darwin.tar.gz
            netcap-aarch64-darwin/netcap-aarch64-darwin.tar.gz
          generate_release_notes: true
